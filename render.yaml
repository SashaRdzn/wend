# Render Blueprint: https://render.com/docs/blueprint-spec
# После подключения репозитория можно импортировать этот файл или скопировать команды вручную.

services:
  - type: web
    name: wedding
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm ci --prefix ../frontend && npm run build --prefix ../frontend && npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      # Задайте в панели Render: ADMIN_PASSWORD, при необходимости PORT
